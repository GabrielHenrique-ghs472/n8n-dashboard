name: Keepalive Render (Free)

on:
  schedule:
    # Mantém o serviço ativo com ping frequente (UTC)
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/keepalive.yml

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production app
        env:
          BASE_URL: https://n8n-error-dashboard.onrender.com
        run: |
          set -euo pipefail

          hit() {
            local endpoint="$1"
            local url="${BASE_URL}${endpoint}"
            local status
            status=$(curl -sS -m 60 -o /dev/null -w "%{http_code}" "$url")
            echo "GET ${endpoint} -> HTTP ${status}"
            if [ "$status" != "200" ]; then
              echo "Endpoint ${endpoint} falhou com HTTP ${status}" >&2
              exit 1
            fi
          }

          hit "/"
          hit "/api/status"
